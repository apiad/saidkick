<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Saidkick</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    margin: 0;
    padding: 12px 14px;
    width: 260px;
    background: #fafafa;
    color: #222;
  }
  h1 {
    margin: 0 0 10px 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }
  .label {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .value {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.ok { background: #21a870; }
  .dot.bad { background: #d83b3b; }
  .dot.pending { background: #d9a83b; }
  #status-text.ok { color: #21a870; }
  #status-text.bad { color: #d83b3b; }
  #status-text.pending { color: #a07820; }
  button {
    margin-top: 10px;
    width: 100%;
    padding: 7px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { background: #f0f0f0; }
  button:active { background: #e0e0e0; }
  button:disabled { opacity: 0.5; cursor: default; }
  .muted {
    color: #999;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    padding-top: 2px;
  }
</style>
</head>
<body>
<h1>Saidkick</h1>

<div class="row">
  <span class="label">Status</span>
  <span><span id="dot" class="dot pending"></span><span id="status-text" class="pending">…</span></span>
</div>

<div class="row">
  <span class="label">Browser</span>
  <span id="browser-id" class="value muted">—</span>
</div>

<div class="row">
  <span class="label">Server</span>
  <span id="server-url" class="value muted">—</span>
</div>

<button id="reconnect">Reconnect</button>

<script src="popup.js"></script>
</body>
</html>
